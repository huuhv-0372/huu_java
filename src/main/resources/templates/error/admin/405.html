<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>405 - Sai phương thức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="col-md-7">
        <div class="card shadow-lg border-0" style="border-radius: 15px;">
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <i class="fas fa-hand-paper text-secondary" style="font-size: 80px;"></i>
                </div>

                <h1 class="display-5 fw-bold text-dark">405 - Not Allowed</h1>
                <h4 class="text-secondary mb-4">Phương thức không hợp lệ!</h4>

                <p class="text-muted mb-4">
                    Hệ thống không hỗ trợ phương thức truy cập này. Bạn không thể thực hiện thao tác (VD: Gửi form) trực tiếp qua thanh địa chỉ.
                </p>

                <div class="alert alert-secondary text-start mb-4" th:if="${path != null}">
                    <small><strong>Đường dẫn:</strong> <span th:text="${path}">/duong-dan-loi</span></small>
                </div>

                <div class="d-grid gap-2 d-md-block">
                    <button onclick="history.back()" class="btn btn-outline-secondary px-4 me-md-2">
                        <i class="fas fa-arrow-left"></i> Quay lại
                    </button>
                    <a th:href="@{/admin}" class="btn btn-primary px-4">
                        <i class="fas fa-home"></i> Về trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
