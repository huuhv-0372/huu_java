<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>409 - Xung đột dữ liệu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="col-md-7">
        <div class="card shadow-lg border-0" style="border-radius: 15px;">
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <i class="fas fa-copy text-info" style="font-size: 80px;"></i>
                </div>

                <h1 class="display-5 fw-bold text-dark">409 - Conflict</h1>
                <h4 class="text-info mb-4">Dữ liệu bị trùng lặp!</h4>

                <p class="text-muted mb-4">
                    Thao tác của bạn không thể hoàn thành do xung đột dữ liệu. Có thể thông tin bạn nhập (Email, Số điện thoại...) đã tồn tại trên hệ thống.
                </p>

                <div class="alert alert-secondary text-start mb-4" th:if="${message != null}">
                    <small><strong>Chi tiết lỗi:</strong> <span th:text="${message}">Thông tin lỗi...</span></small>
                </div>

                <div class="d-grid gap-2 d-md-block">
                    <button onclick="history.back()" class="btn btn-outline-secondary px-4 me-md-2">
                        <i class="fas fa-arrow-left"></i> Sửa lại dữ liệu
                    </button>
                    <a th:href="@{/admin}" class="btn btn-primary px-4">
                        <i class="fas fa-home"></i> Về trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
