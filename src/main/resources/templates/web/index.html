<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{web/layout/base}">
<head>
    <title>Menu Sản Phẩm</title>
</head>
<body>

<div layout:fragment="content">

    <div class="text-center mb-5">
        <h1 class="fw-bold">Khám Phá Thực Đơn</h1>
        <p class="text-muted">Lọc và tìm kiếm những món ăn, đồ uống yêu thích của bạn</p>
    </div>

    <div class="row">
        <aside class="col-lg-3 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title fw-bold border-bottom pb-2 mb-3">
                        <i class="fa-solid fa-filter text-primary"></i> Bộ lọc
                    </h5>

                    <form action="/menu" method="get">
                        <div class="mb-3">
                            <label class="form-label fw-medium">Phân loại</label>
                            <select name="type" class="form-select">
                                <option value="">Tất cả</option>
                                <option value="FOOD">Đồ ăn (Food)</option>
                                <option value="DRINK">Đồ uống (Drink)</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Danh mục</label>
                            <select name="categoryId" class="form-select">
                                <option value="">Tất cả danh mục</option>
                                <option value="1">Trà sữa</option>
                                <option value="2">Đồ ăn nhanh</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Sắp xếp theo</label>
                            <select name="sort" class="form-select">
                                <option value="name_asc">Tên (A-Z)</option>
                                <option value="price_asc">Giá (Thấp đến Cao)</option>
                                <option value="price_desc">Giá (Cao xuống Thấp)</option>
                                <option value="rating_desc">Đánh giá tốt nhất</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Áp dụng bộ lọc</button>
                    </form>
                </div>
            </div>
        </aside>

        <div class="col-lg-9">
            <div class="row row-cols-1 row-cols-md-3 g-4">

                <div class="col">
                    <div class="card h-100 shadow-sm border-0 product-card">
                        <img src="https://images.unsplash.com/photo-1572449043416-55f4685c9bb7?auto=format&fit=crop&w=400&q=80"
                             class="card-img-top" alt="Product Image" style="height: 200px; object-fit: cover;">

                        <div class="card-body d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h6 class="card-title fw-bold text-truncate mb-0">Burger Phô Mai Sợi</h6>
                                <span class="badge bg-warning text-dark">FOOD</span>
                            </div>

                            <div class="text-warning small mb-2">
                                <i class="fa-solid fa-star"></i>
                                <i class="fa-solid fa-star"></i>
                                <i class="fa-solid fa-star"></i>
                                <i class="fa-solid fa-star"></i>
                                <i class="fa-solid fa-star-half-stroke"></i>
                                <span class="text-muted ms-1">(4.5)</span>
                            </div>

                            <h5 class="text-primary fw-bold mt-auto mb-3">$12.50</h5>

                            <div class="d-flex gap-2">
                                <a href="/products/burger-pho-mai" class="btn btn-outline-secondary btn-sm flex-grow-1">Chi tiết</a>
                                <form action="/cart/add" method="post" class="flex-grow-1">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="productId" value="1">
                                    <button type="submit" class="btn btn-primary btn-sm w-100">
                                        <i class="fa-solid fa-cart-plus"></i> Thêm
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <nav class="mt-5">
                <ul class="pagination justify-content-center">
                    <li class="page-item disabled"><a class="page-link" href="#">Trước</a></li>
                    <li class="page-item active"><a class="page-link" href="#">1</a></li>
                    <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item"><a class="page-link" href="#">Sau</a></li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<th:block layout:fragment="scripts">
    <script>
        // Các logic JS tương tác riêng cho trang menu (nếu có)
    </script>
</th:block>

</body>
</html>
