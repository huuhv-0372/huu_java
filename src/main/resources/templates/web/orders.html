<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{web/layout/base}">
<head>
    <title>Lịch Sử Đơn Hàng</title>
</head>
<body>

<div layout:fragment="content">
    <h1 class="fw-bold mb-4">Lịch Sử Đơn Hàng</h1>

    <div th:if="${orderPage.empty}" class="text-center py-5">
        <i class="fa-solid fa-receipt fs-1 text-muted mb-3"></i>
        <h5 class="text-muted">Bạn chưa có đơn hàng nào!</h5>
        <a href="/menu" class="btn btn-primary mt-3">Khám phá thực đơn</a>
    </div>

    <div th:if="${!orderPage.empty}" class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead>
                <tr>
                    <th>Mã đơn</th>
                    <th>Ngày đặt</th>
                    <th class="text-center">Trạng thái</th>
                    <th class="text-end">Tổng tiền</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orderPage.content}">
                    <td class="fw-bold" th:text="'#' + ${order.id}">#1</td>
                    <td th:text="${#temporals.format(order.orderedAt != null ? order.orderedAt : order.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                    <td class="text-center">
                        <span class="badge" th:classappend="${order.status.badgeClass}" th:text="${order.status.label}">Trạng thái</span>
                    </td>
                    <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(order.totalPrice, 1, 'POINT', 0, 'COMMA') + ' đ'}">0 đ</td>
                    <td class="text-end">
                        <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-outline-secondary btn-sm">Xem chi tiết</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-4" th:if="${orderPage.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${orderPage.first ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/orders(page=${orderPage.number - 1})}">Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, orderPage.totalPages - 1)}"
                th:classappend="${orderPage.number == i ? 'active' : ''}">
                <a class="page-link" th:href="@{/orders(page=${i})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${orderPage.last ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/orders(page=${orderPage.number + 1})}">Sau</a>
            </li>
        </ul>
    </nav>
</div>

</body>
</html>
