<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Foods & Drinks">Foods & Drinks</title>

    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">

    <th:block layout:fragment="meta-tags"></th:block>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/web/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-user sticky-top py-3">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary fs-4" href="/">
            <i class="fa-solid fa-utensils text-warning"></i> F&B Store
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#userNavbar"
                aria-controls="userNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="userNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                <li class="nav-item">
                    <a class="nav-link fw-medium" href="/"><i class="fa-solid fa-house me-1"></i> Trang chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link fw-medium" href="/menu"><i class="fa-solid fa-book-open me-1"></i> Menu</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link fw-medium" href="/suggest"><i class="fa-regular fa-lightbulb me-1"></i> Góp ý</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link fw-medium" href="/contact"><i class="fa-solid fa-phone me-1"></i> Liên hệ</a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-3">
                <a href="/cart" class="btn btn-light position-relative border rounded-circle p-2">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cartBadge"
                          class="position-absolute translate-middle badge rounded-pill bg-danger cart-badge"
                          th:classappend="${cartItemCount == null or cartItemCount == 0} ? 'd-none' : ''"
                          th:text="${cartItemCount}">3</span>
                </a>

                <div sec:authorize="!isAuthenticated()">
                    <a href="/login" class="btn btn-outline-primary btn-sm px-3">Đăng nhập</a>
                    <a href="/register" class="btn btn-primary btn-sm px-3 ms-1">Đăng ký</a>
                </div>

                <div sec:authorize="isAuthenticated()" class="dropdown">
                    <button class="btn btn-light dropdown-toggle border rounded-pill px-3" type="button" data-bs-toggle="dropdown">
                        <i class="fa-regular fa-circle-user text-primary me-1"></i>
                        <span sec:authentication="name" class="fw-medium">User</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2">
                        <li><a class="dropdown-item" href="/profile"><i class="fa-regular fa-id-badge me-2"></i> Hồ sơ của tôi</a></li>
                        <li><a class="dropdown-item" href="/orders"><i class="fa-solid fa-clock-rotate-left me-2"></i> Lịch sử Đơn hàng</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Đăng xuất
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</nav>

<main layout:fragment="content" class="container py-4">
</main>

<footer class="footer py-5 mt-5">
    <div class="container text-center">
        <h5 class="text-white mb-3"><i class="fa-solid fa-utensils text-warning"></i> Foods & Drinks</h5>
        <p>Thức ăn ngon và đồ uống giải khát được giao tận nơi.</p>
        <div class="d-flex justify-content-center gap-3 fs-5 mb-3">
            <a href="#" class="text-secondary hover-white"><i class="fa-brands fa-facebook"></i></a>
            <a href="#" class="text-secondary hover-white"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="text-secondary hover-white"><i class="fa-brands fa-twitter"></i></a>
        </div>
        <small class="text-muted">&copy; 2026 F&B System. All rights reserved.</small>
    </div>
</footer>

<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
    <div id="appToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div id="appToastBody" class="toast-body"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/web/main.js}"></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
