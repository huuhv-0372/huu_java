<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{web/layout/base}">
<head>
    <title>Chỉnh Sửa Thông Tin</title>
</head>
<body>

<div layout:fragment="content" class="d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-4">
                            <h3 class="fw-bold">Chỉnh Sửa Thông Tin</h3>
                            <p class="text-muted">Cập nhật thông tin cá nhân của bạn.</p>
                        </div>

                        <div th:if="${errorMessage}" class="alert alert-danger text-center" th:text="${errorMessage}"></div>

                        <form th:action="@{/profile/edit}" method="post" th:object="${profileUpdateReqDto}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <div class="mb-3">
                                <label for="fullName" class="form-label fw-medium">Họ và Tên <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                                       id="fullName" th:field="*{fullName}">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-medium">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                       id="email" th:field="*{email}">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            </div>

                            <div class="mb-4">
                                <label for="phone" class="form-label fw-medium">Số điện thoại <span class="text-danger">*</span></label>
                                <input type="tel" class="form-control" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                                       id="phone" th:field="*{phone}">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                            </div>

                            <hr class="mb-4">
                            <p class="text-muted small mb-3">Để trống các trường dưới đây nếu bạn không muốn đổi mật khẩu.</p>

                            <div class="mb-3">
                                <label for="currentPassword" class="form-label fw-medium">Mật khẩu hiện tại</label>
                                <input type="password" class="form-control" id="currentPassword" th:field="*{currentPassword}">
                            </div>

                            <div class="mb-3">
                                <label for="newPassword" class="form-label fw-medium">Mật khẩu mới</label>
                                <input type="password" class="form-control" th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid' : ''"
                                       id="newPassword" th:field="*{newPassword}">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                            </div>

                            <div class="mb-4">
                                <label for="confirmNewPassword" class="form-label fw-medium">Xác nhận mật khẩu mới</label>
                                <input type="password" class="form-control" id="confirmNewPassword" th:field="*{confirmNewPassword}">
                            </div>

                            <div class="d-flex gap-2">
                                <a href="/profile" class="btn btn-outline-secondary w-50">Hủy</a>
                                <button type="submit" class="btn btn-primary w-50 fw-bold">Lưu Thay Đổi</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
