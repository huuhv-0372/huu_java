<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{web/layout/base}">
<head>
    <title>Giỏ Hàng</title>
</head>
<body>

<div layout:fragment="content">
    <h1 class="fw-bold mb-4">Giỏ Hàng Của Bạn</h1>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-check me-1"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${cart == null}" class="text-center py-5">
        <i class="fa-solid fa-cart-shopping fs-1 text-muted mb-3"></i>
        <h5 class="text-muted">Giỏ hàng của bạn đang trống!</h5>
        <a href="/" class="btn btn-primary mt-3">Tiếp tục mua sắm</a>
    </div>

    <div th:if="${cart != null}" class="row g-4">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th class="text-center">Đơn giá</th>
                            <th class="text-center" style="width: 160px;">Số lượng</th>
                            <th class="text-end">Tạm tính</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${cart.items}">
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <img th:src="${item.productImageUrl != null ? item.productImageUrl : '/uploads/products/default-food.png'}"
                                         style="width: 50px; height: 50px; object-fit: cover;" class="rounded">
                                    <span class="fw-medium" th:text="${item.productName}">Tên sản phẩm</span>
                                </div>
                            </td>
                            <td class="text-center" th:text="${'$' + item.unitPrice}">$0.00</td>
                            <td>
                                <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post" class="d-flex gap-1">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="number" name="quantity" th:value="${item.quantity}" min="1" max="50"
                                           class="form-control form-control-sm" style="width: 70px;">
                                    <button type="submit" class="btn btn-outline-secondary btn-sm" title="Cập nhật">
                                        <i class="fa-solid fa-rotate"></i>
                                    </button>
                                </form>
                            </td>
                            <td class="text-end fw-bold" th:text="${'$' + item.subtotal}">$0.00</td>
                            <td class="text-end">
                                <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-outline-danger btn-sm" title="Xóa">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm border-0 p-4">
                <h5 class="fw-bold mb-3">Thanh Toán</h5>
                <div class="d-flex justify-content-between align-items-center mb-3 pb-3 border-bottom">
                    <span class="text-muted">Tổng cộng</span>
                    <span class="fw-bold fs-5 text-primary" th:text="${'$' + cart.totalPrice}">$0.00</span>
                </div>

                <form th:action="@{/cart/checkout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="mb-3">
                        <label class="form-label fw-medium">Địa chỉ giao hàng</label>
                        <textarea name="shippingAddress" class="form-control" rows="2" required
                                  placeholder="Số nhà, đường, quận/huyện..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Ghi chú (không bắt buộc)</label>
                        <textarea name="note" class="form-control" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fa-solid fa-check me-1"></i> Đặt Hàng
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
