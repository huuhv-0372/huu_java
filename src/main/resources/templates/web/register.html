<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{web/layout/base}">
<head>
    <title>Đăng Ký Tài Khoản</title>
</head>
<body>

<div layout:fragment="content" class="d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-4">
                            <h3 class="fw-bold">Tạo Tài Khoản Mới</h3>
                            <p class="text-muted">Tham gia cùng chúng tôi để trải nghiệm F&B tốt nhất.</p>
                        </div>

                        <div th:if="${errorMsg}" class="alert alert-danger text-center" th:text="${errorMsg}"></div>

                        <div th:if="${successMsg}" class="alert alert-success text-center" th:text="${successMsg}"></div>

                        <form th:action="@{/register}" method="post" th:object="${registerReqDto}">
                            <input th:if="${_csrf != null}" type="hidden"
                                   th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger py-2 small">
                                <p class="mb-0" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                            </div>

                            <div class="mb-3">
                                <label for="fullName" class="form-label fw-medium">Họ và Tên <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fa-regular fa-user"></i></span>
                                    <input type="text" class="form-control" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                                           id="fullName" th:field="*{fullName}" placeholder="Nhập họ và tên của bạn" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="username" class="form-label fw-medium">Username <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fa-solid fa-at"></i></span>
                                    <input type="text" class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                                           id="username" th:field="*{username}" placeholder="Tên đăng nhập viết liền không dấu" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-medium">Email <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fa-regular fa-envelope"></i></span>
                                    <input type="email" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                                           id="email" th:field="*{email}" placeholder="name@example.com" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="phone" class="form-label fw-medium">Số điện thoại <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fa-solid fa-phone"></i></span>
                                    <input type="tel" class="form-control" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                                           id="phone" th:field="*{phone}" placeholder="Ví dụ: 0912345678" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-medium">Mật khẩu <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fa-solid fa-lock"></i></span>
                                    <input type="password" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                                           id="password" th:field="*{password}" placeholder="Tối thiểu 6 ký tự" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label fw-medium">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fa-solid fa-check-double"></i></span>
                                    <input type="password" class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                                           id="confirmPassword" th:field="*{confirmPassword}" placeholder="Nhập lại mật khẩu" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">Đăng Ký</button>

                        </form>

                        <div class="text-center mt-3 small">
                            Đã có tài khoản? <a href="/login" class="fw-bold text-decoration-none">Đăng nhập ngay</a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
