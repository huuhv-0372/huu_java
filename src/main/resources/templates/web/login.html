<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{web/layout/base}">
<head>
    <title>Đăng Nhập</title>
</head>
<body>

<div layout:fragment="content" class="d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-4">
                            <h3 class="fw-bold">Đăng Nhập</h3>
                            <p class="text-muted">Chào mừng bạn quay trở lại F&B Store!</p>
                        </div>

                        <div th:if="${errorMsg}" class="alert alert-danger text-center" th:text="${errorMsg}"></div>

                        <div th:if="${successMsg}" class="alert alert-success text-center" th:text="${successMsg}"></div>

                        <div th:if="${param.error}" class="alert alert-danger py-2 small">
                            <i class="fa-solid fa-circle-exclamation me-1"></i> Tên đăng nhập, email hoặc mật khẩu không chính xác.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success py-2 small">
                            <i class="fa-solid fa-circle-check me-1"></i> Bạn đã đăng xuất thành công.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <input th:if="${_csrf != null}" type="hidden"
                                   th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label for="username" class="form-label fw-medium">Email hoặc Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fa-solid fa-user-check"></i></span>
                                    <input type="text" class="form-control" id="username" name="username"
                                           placeholder="Nhập email hoặc username của bạn" required autofocus>
                                </div>
                            </div>

                            <div class="mb-3">
                                <div class="d-flex justify-content-between">
                                    <label for="password" class="form-label fw-medium">Mật khẩu</label>
                                    <a href="/forgot-password" class="text-decoration-none small text-primary">Quên mật khẩu?</a>
                                </div>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fa-solid fa-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password"
                                           placeholder="Nhập mật khẩu" required>
                                </div>
                            </div>

                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe" name="remember-me">
                                <label class="form-check-label small" for="rememberMe">Ghi nhớ đăng nhập</label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">Đăng Nhập</button>
                        </form>

                        <div class="d-flex align-items-center divider my-4">
                            <span class="px-3 text-muted small">Hoặc đăng nhập bằng</span>
                        </div>

                        <div class="d-grid gap-2">
                            <a href="/oauth2/authorization/google" class="btn btn-google">
                                <i class="fa-brands fa-google me-2"></i> Google
                            </a>
                            <a href="/oauth2/authorization/facebook" class="btn btn-facebook">
                                <i class="fa-brands fa-facebook-f me-2"></i> Facebook
                            </a>
                            <a href="/oauth2/authorization/twitter" class="btn btn-twitter">
                                <i class="fa-brands fa-twitter me-2"></i> Twitter
                            </a>
                        </div>

                        <div class="text-center mt-4 small">
                            Chưa có tài khoản? <a href="/register" class="fw-bold text-decoration-none">Đăng ký ngay</a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
