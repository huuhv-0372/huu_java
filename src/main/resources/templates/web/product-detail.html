<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{web/layout/base}">
<head>
    <title th:text="${product.name} + ' - F&B Store'">Chi tiết sản phẩm</title>

    <th:block layout:fragment="meta-tags">
        <meta property="og:title" th:content="${product.name}" />
        <meta property="og:description" th:content="${product.description != null ? product.description : 'Món ngon tuyệt đỉnh tại F&B Store!'}" />
        <meta property="og:image" th:content="${baseUrl + product.primaryImageUrl}" />
        <meta property="og:type" content="product" />
    </th:block>
</head>
<body>

<div layout:fragment="content">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-check me-1"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/menu">Menu</a></li>
            <li class="breadcrumb-item" th:if="${product.category != null}">
                <a th:href="@{/categories/{slug}(slug=${product.category.slug})}" th:text="${product.category.name}">Category</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${product.name}">Product Name</li>
        </ol>
    </nav>

    <div class="row">
        <div class="col-md-6 mb-4">
            <img id="mainProductImage" th:src="${product.primaryImageUrl}" class="img-fluid rounded shadow-sm w-100 mb-2" style="object-fit: cover; max-height: 400px;">

            <div class="d-flex gap-2 overflow-auto" th:if="${product.images.size() > 1}">
                <img th:each="img : ${product.images}" th:src="${img.imageUrl}" th:alt="${product.name}"
                     class="rounded border" style="width: 80px; height: 80px; object-fit: cover; cursor: pointer;"
                     onclick="document.getElementById('mainProductImage').src = this.src">
            </div>
        </div>

        <div class="col-md-6">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <a th:if="${product.category != null}" class="badge bg-primary fs-6 text-decoration-none" th:href="@{/categories/{slug}(slug=${product.category.slug})}" th:text="${product.category.name}">Category</a>
                <div class="text-warning fs-5">
                    <i class="fa-solid fa-star"></i> <span class="text-dark fw-bold ms-1" th:text="${product.ratingAvg}">5.0</span>
                    <span class="text-muted small" th:text="'(' + ${product.ratingCount} + ' đánh giá)'">(0 đánh giá)</span>
                </div>
            </div>

            <h1 class="fw-bold mb-3" th:text="${product.name}">Tên Sản Phẩm</h1>
            <h2 class="text-primary fw-bold mb-4" th:text="${#numbers.formatDecimal(product.price, 1, 'POINT', 0, 'COMMA') + ' đ'}">0 đ</h2>

            <p class="text-muted lh-lg mb-4" th:text="${product.description}">Mô tả sản phẩm sẽ nằm ở đây...</p>

            <form th:action="@{/cart/add}" method="post" class="js-add-to-cart-form mb-4 bg-light p-4 rounded border">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="productId" th:value="${product.id}">

                <div class="row align-items-center g-3">
                    <div class="col-auto">
                        <label for="quantity" class="col-form-label fw-bold">Số lượng:</label>
                    </div>
                    <div class="col-auto">
                        <input type="number" id="quantity" name="quantity" class="form-control" value="1" min="1" max="50">
                    </div>
                    <div class="col-12 col-md-auto mt-3 mt-md-0 ms-md-auto">
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="fa-solid fa-cart-plus me-2"></i>Thêm Vào Giỏ
                        </button>
                    </div>
                </div>
            </form>

            <div class="d-flex align-items-center gap-3">
                <span class="fw-medium text-muted">Chia sẻ: </span>
                <a th:href="${'https://www.facebook.com/sharer/sharer.php?u=' + #uris.escapeQueryParam(baseUrl + '/products/' + product.slug)}"
                   target="_blank" rel="noopener" class="btn btn-outline-primary btn-sm rounded-circle" style="width: 35px; height: 35px; padding-top: 5px;">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>
                <a th:href="${'https://twitter.com/intent/tweet?url=' + #uris.escapeQueryParam(baseUrl + '/products/' + product.slug) + '&text=' + #uris.escapeQueryParam(product.name)}"
                   target="_blank" rel="noopener" class="btn btn-outline-info btn-sm rounded-circle" style="width: 35px; height: 35px; padding-top: 5px;">
                    <i class="fa-brands fa-twitter"></i>
                </a>
            </div>
        </div>
    </div>

    <hr class="my-5">

    <div class="row g-4">
        <div class="col-lg-6">
            <h4 class="fw-bold mb-3" th:text="${myRating != null ? 'Cập Nhật Đánh Giá Của Bạn' : 'Đánh Giá Sản Phẩm'}">Đánh Giá Sản Phẩm</h4>

            <div sec:authorize="isAuthenticated()">
                <form th:action="@{/products/{slug}/rate(slug=${product.slug})}" method="post" class="card shadow-sm border-0 p-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <label class="form-label fw-medium">Chọn số sao</label>
                    <div class="btn-group mb-3" role="group" aria-label="Chọn số sao">
                        <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                            <input type="radio" class="btn-check" name="stars" th:id="'star' + ${i}" th:value="${i}"
                                   th:checked="${myRating != null and myRating.stars == i}" autocomplete="off" required>
                            <label class="btn btn-outline-warning" th:for="'star' + ${i}" th:text="${i} + ' ★'">1 ★</label>
                        </th:block>
                    </div>

                    <div class="mb-3">
                        <textarea name="comment" class="form-control" rows="3" maxlength="2000"
                                  th:text="${myRating != null ? myRating.comment : ''}"
                                  placeholder="Chia sẻ cảm nhận của bạn về sản phẩm này (không bắt buộc)..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-star me-1"></i>
                        <span th:text="${myRating != null ? 'Cập Nhật Đánh Giá' : 'Gửi Đánh Giá'}">Gửi Đánh Giá</span>
                    </button>
                </form>
            </div>
            <div sec:authorize="!isAuthenticated()" class="alert alert-light border">
                <a th:href="@{/login}">Đăng nhập</a> để đánh giá sản phẩm này.
            </div>
        </div>

        <div class="col-lg-6">
            <h4 class="fw-bold mb-3" th:text="'Nhận Xét Từ Khách Hàng (' + ${ratings.size()} + ')'">Nhận Xét Từ Khách Hàng</h4>

            <div th:if="${ratings.isEmpty()}" class="text-muted">Chưa có đánh giá nào cho sản phẩm này.</div>

            <div th:unless="${ratings.isEmpty()}" class="d-flex flex-column gap-3" style="max-height: 420px; overflow-y: auto;">
                <div class="card shadow-sm border-0 p-3" th:each="r : ${ratings}">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="fw-medium" th:text="${r.userFullName}">Khách hàng</span>
                        <span class="text-warning small">
                            <i class="fa-solid fa-star" th:each="s : ${#numbers.sequence(1, r.stars)}"></i>
                        </span>
                    </div>
                    <p class="mb-1" th:if="${r.comment != null and !r.comment.isBlank()}" th:text="${r.comment}">Bình luận</p>
                    <span class="text-muted small" th:text="${#temporals.format(r.createdAt, 'dd/MM/yyyy')}">01/01/2026</span>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
