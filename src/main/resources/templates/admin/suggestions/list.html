<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>Quản lý Góp Ý</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0">
            <i class="fa-solid fa-comment-dots text-primary me-2"></i>Quản lý Góp Ý
        </h2>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-check me-1"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Quick-status tabs -->
    <div class="mb-3 d-flex flex-wrap gap-2">
        <a th:href="@{/admin/suggestions}" class="btn btn-sm"
           th:classappend="${searchStatus == null} ? 'btn-dark' : 'btn-outline-dark'">
            Tất cả
        </a>
        <a th:each="s : ${suggestionStatuses}"
           th:href="@{/admin/suggestions(status=${s.name()})}"
           class="btn btn-sm"
           th:classappend="${searchStatus == s.name()} ? ${s.badgeClass} : 'btn-outline-secondary'">
            <span th:text="${s.label}"></span>
        </a>
    </div>

    <!-- Search form -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form th:action="@{/admin/suggestions}" method="get" class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label class="form-label fw-medium">Tìm kiếm (username / tên / nội dung)</label>
                    <input type="text" name="keyword" class="form-control"
                           placeholder="Tìm theo người dùng hoặc nội dung góp ý..."
                           th:value="${searchKeyword}">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-medium">Trạng thái</label>
                    <select name="status" class="form-select">
                        <option value="">-- Tất cả --</option>
                        <option th:each="s : ${suggestionStatuses}"
                                th:value="${s.name()}"
                                th:text="${s.label}"
                                th:selected="${searchStatus == s.name()}">
                        </option>
                    </select>
                </div>
                <div class="col-md-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fa-solid fa-magnifying-glass me-1"></i> Tìm
                    </button>
                    <a th:href="@{/admin/suggestions}" class="btn btn-outline-secondary">
                        <i class="fa-solid fa-rotate-left"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Result summary -->
    <div class="d-flex justify-content-between align-items-center mb-2 px-1">
        <small class="text-muted">Tổng: <strong th:text="${totalElements}">0</strong> góp ý</small>
        <small class="text-muted">
            Trang <strong th:text="${currentPage + 1}">1</strong> /
            <strong th:text="${totalPages > 0 ? totalPages : 1}">1</strong>
        </small>
    </div>

    <!-- Table -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0 table-responsive">
            <table class="table table-hover table-striped m-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th class="px-3 py-3" style="width:50px">#</th>
                    <th class="py-3">Người gửi</th>
                    <th class="py-3">Nội dung</th>
                    <th class="py-3">Trạng thái</th>
                    <th class="py-3">Ghi chú admin</th>
                    <th class="py-3 text-nowrap">Ngày gửi</th>
                    <th class="py-3 text-end px-4">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(suggestions)}">
                    <td colspan="7" class="text-center py-4 text-muted">Không tìm thấy góp ý nào.</td>
                </tr>
                <tr th:each="s : ${suggestions}">
                    <td class="px-3 fw-bold text-muted" th:text="${s.id}"></td>
                    <td>
                        <div class="fw-medium" th:text="${s.userFullName}"></div>
                        <small class="text-muted" th:text="'@' + ${s.username}"></small>
                    </td>
                    <td style="max-width:300px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"
                        th:title="${s.content}"
                        th:text="${s.content}">
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${s.status.badgeClass}"
                              th:text="${s.status.label}">
                        </span>
                    </td>
                    <td class="text-muted small"
                        style="max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"
                        th:title="${s.adminNote}"
                        th:text="${s.adminNote != null and !s.adminNote.isBlank()} ? ${s.adminNote} : '—'">
                    </td>
                    <td class="text-muted small text-nowrap"
                        th:text="${s.createdAt != null ? #temporals.format(s.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">
                    </td>
                    <td class="text-end px-4">
                        <!-- Inline status update -->
                        <form th:action="@{/admin/suggestions/{id}/status(id=${s.id})}"
                              method="post" class="d-inline-flex gap-1 align-items-center">
                            <input th:if="${_csrf != null}" type="hidden"
                                   th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="redirectTo" value="list"/>
                            <select name="newStatus" class="form-select form-select-sm" style="width:auto">
                                <option th:each="st : ${suggestionStatuses}"
                                        th:value="${st.name()}"
                                        th:text="${st.label}"
                                        th:selected="${st == s.status}">
                                </option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-outline-success" title="Cập nhật">
                                <i class="fa-solid fa-check"></i>
                            </button>
                        </form>
                        <!-- View detail -->
                        <a th:href="@{/admin/suggestions/{id}(id=${s.id})}"
                           class="btn btn-sm btn-outline-primary ms-1" title="Xem & Phản hồi">
                            <i class="fa-solid fa-eye"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" class="mt-4 d-flex justify-content-center">
        <ul class="pagination mb-0">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/suggestions(page=${currentPage-1},size=${pageSize},status=${searchStatus},keyword=${searchKeyword})}">
                    &laquo;
                </a>
            </li>
            <th:block th:with="s=${T(java.lang.Math).max(0,currentPage-2)},e=${T(java.lang.Math).min(totalPages-1,currentPage+2)}">
                <li class="page-item" th:each="i : ${#numbers.sequence(s,e)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:text="${i + 1}"
                       th:href="@{/admin/suggestions(page=${i},size=${pageSize},status=${searchStatus},keyword=${searchKeyword})}">
                    </a>
                </li>
            </th:block>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/suggestions(page=${currentPage+1},size=${pageSize},status=${searchStatus},keyword=${searchKeyword})}">
                    &raquo;
                </a>
            </li>
        </ul>
    </nav>

</div>
</body>
</html>
