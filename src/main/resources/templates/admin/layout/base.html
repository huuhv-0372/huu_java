<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Admin F&B">Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/admin/style.css}">
</head>
<body class="d-flex">

<div class="sidebar d-flex flex-column" style="width: 250px;">
    <div class="text-center py-4 fs-4 fw-bold border-bottom border-secondary">
        <i class="fa-solid fa-burger text-warning"></i> F&B Admin
    </div>
    <div class="nav flex-column mt-3">
        <a href="/admin/dashboard" class="active"><i class="fa-solid fa-chart-pie me-2"></i> Dashboard</a>
        <a href="/admin/categories"><i class="fa-solid fa-tags me-2"></i> Manage Categories</a>
        <a href="/admin/products"><i class="fa-solid fa-box-open me-2"></i> Manage Products</a>
        <a href="/admin/orders"><i class="fa-solid fa-cart-shopping me-2"></i> Manage Orders</a>
        <a href="/admin/users"><i class="fa-solid fa-users me-2"></i> Manage Users</a>
        <a href="/admin/suggestions"><i class="fa-solid fa-comment-dots me-2"></i> User Suggestions</a>
    </div>
</div>

<div class="content-area d-flex flex-column">
    <nav class="navbar navbar-admin navbar-expand px-4 py-2 mb-4 rounded d-flex justify-content-end">
        <div class="dropdown">
            <button class="btn btn-light dropdown-toggle border" type="button" data-bs-toggle="dropdown">
                <i class="fa-solid fa-user-shield me-1"></i>
                <span th:text="${#authentication.name}">Admin User</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#"><i class="fa-solid fa-gear me-2"></i> Settings</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/logout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="dropdown-item text-danger">
                            <i class="fa-solid fa-right-from-bracket me-2"></i> Sign out
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>

    <main layout:fragment="content">
    </main>

    <footer class="mt-auto text-center text-muted py-3">
        <small>&copy; 2026 Foods & Drinks System. Crafted with Spring Boot.</small>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/admin/main.js}"></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
