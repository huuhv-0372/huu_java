<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title>Quản lý Sản Phẩm</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0"><i class="fa-solid fa-box-open text-primary me-2"></i>Quản lý Sản Phẩm</h2>
        <a th:href="@{/admin/products/add}" class="btn btn-primary fw-medium shadow-sm">
            <i class="fa-solid fa-plus me-1"></i> Thêm Mới
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-check me-1"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search form -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form th:action="@{/admin/products}" method="get" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />  <label class="form-label fw-medium">Tên sản phẩm</label>
                    <input type="text" name="name" class="form-control" placeholder="Tìm theo tên..."
                           th:value="${searchName}">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-medium">Danh mục</label>
                    <select name="categoryId" class="form-select">
                        <option value="">-- Tất cả --</option>
                        <option th:each="cat : ${allCategories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${searchCategoryId != null and searchCategoryId == cat.id}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-medium">Loại</label>
                    <select name="type" class="form-select">
                        <option value="">-- Tất cả --</option>
                        <option th:each="t : ${productTypes}"
                                th:value="${t.name()}"
                                th:text="${t.label + ' (' + t.name() + ')'}"
                                th:selected="${searchType == t.name()}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-medium">Trạng thái</label>
                    <select name="isAvailable" class="form-select">
                        <option value="">-- Tất cả --</option>
                        <option value="true"  th:selected="${searchIsAvailable == 'true'}">Đang bán</option>
                        <option value="false" th:selected="${searchIsAvailable == 'false'}">Đã ẩn</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fa-solid fa-magnifying-glass me-1"></i> Tìm
                    </button>
                    <a th:href="@{/admin/products}" class="btn btn-outline-secondary">
                        <i class="fa-solid fa-rotate-left"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Result summary -->
    <div class="d-flex justify-content-between align-items-center mb-2 px-1">
        <small class="text-muted">Tổng: <strong th:text="${totalElements}">0</strong> sản phẩm</small>
        <small class="text-muted">
            Trang <strong th:text="${currentPage + 1}">1</strong> /
            <strong th:text="${totalPages > 0 ? totalPages : 1}">1</strong>
        </small>
    </div>

    <!-- Table -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0 table-responsive">
            <table class="table table-hover table-striped m-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th class="px-3 py-3" style="width:50px">ID</th>
                    <th class="py-3" style="width:70px">Ảnh</th>
                    <th class="py-3">Tên Sản Phẩm</th>
                    <th class="py-3">Danh Mục</th>
                    <th class="py-3">Loại</th>
                    <th class="py-3">Giá</th>
                    <th class="py-3">Trạng thái</th>
                    <th class="py-3">Ngày tạo</th>
                    <th class="py-3 text-end px-4">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="9" class="text-center py-4 text-muted">Không tìm thấy sản phẩm nào.</td>
                </tr>
                <tr th:each="p : ${products}">
                    <td class="px-3 fw-bold" th:text="${p.id}"></td>
                    <td>
                        <img th:if="${p.primaryImageUrl != null}"
                             th:src="${p.primaryImageUrl}"
                             width="48" height="48"
                             class="rounded border object-fit-cover"
                             th:alt="${p.name}">
                        <span th:unless="${p.primaryImageUrl != null}"
                              class="badge bg-light text-muted border">
                            <i class="fa-solid fa-image"></i>
                        </span>
                    </td>
                    <td>
                        <span class="fw-medium" th:text="${p.name}"></span>
                        <br>
                        <small class="text-muted" th:text="${p.slug}"></small>
                    </td>
                    <td th:text="${p.categoryName}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${p.type.name() == 'FOOD' ? 'bg-warning text-dark' : 'bg-info text-dark'}"
                              th:text="${p.type.label}">
                        </span>
                    </td>
                    <td class="fw-medium text-success"
                        th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${p.isAvailable} ? 'bg-success' : 'bg-secondary'"
                              th:text="${p.isAvailable} ? 'Đang bán' : 'Đã ẩn'">
                        </span>
                    </td>
                    <td class="text-muted small text-nowrap"
                        th:text="${p.createdAt != null} ? ${#temporals.format(p.createdAt, 'dd/MM/yyyy')} : '—'">
                    </td>
                    <td class="text-end px-4">
                        <a th:href="@{/admin/products/edit/{id}(id=${p.id})}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </a>
                        <form th:action="@{/admin/products/{id}/delete(id=${p.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Xóa sản phẩm này? Tất cả ảnh sẽ bị xóa theo.');">
                           <button type="submit" class="btn btn-sm btn-outline-danger ms-1">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" class="mt-4 d-flex justify-content-center">
        <ul class="pagination mb-0">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/products(page=${currentPage - 1},size=${pageSize},name=${searchName},categoryId=${searchCategoryId},type=${searchType},isAvailable=${searchIsAvailable})}">
                    &laquo;
                </a>
            </li>
            <th:block th:with="startPage=${T(java.lang.Math).max(0,currentPage-2)},endPage=${T(java.lang.Math).min(totalPages-1,currentPage+2)}">
                <li class="page-item" th:each="i : ${#numbers.sequence(startPage,endPage)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:text="${i + 1}"
                       th:href="@{/admin/products(page=${i},size=${pageSize},name=${searchName},categoryId=${searchCategoryId},type=${searchType},isAvailable=${searchIsAvailable})}">
                    </a>
                </li>
            </th:block>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/products(page=${currentPage + 1},size=${pageSize},name=${searchName},categoryId=${searchCategoryId},type=${searchType},isAvailable=${searchIsAvailable})}">
                    &raquo;
                </a>
            </li>
        </ul>
    </nav>

</div>
</body>
</html>
