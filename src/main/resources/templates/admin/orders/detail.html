<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title th:text="'Đơn hàng #' + ${order.id}">Chi tiết đơn hàng</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0">
            <i class="fa-solid fa-receipt text-primary me-2"></i>
            Đơn hàng
            <span th:text="'#' + ${order.id}" class="text-primary"></span>
        </h2>
        <a th:href="@{/admin/orders}" class="btn btn-secondary shadow-sm">
            <i class="fa-solid fa-arrow-left me-1"></i> Quay lại
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-check me-1"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- Left: order info + items -->
        <div class="col-lg-8">

            <!-- Order items -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header fw-bold bg-white border-bottom">
                    <i class="fa-solid fa-list-ul me-2 text-primary"></i>
                    Sản phẩm trong đơn
                    <span class="badge bg-secondary ms-1" th:text="${#lists.size(order.items)}"></span>
                </div>
                <div class="card-body p-0 table-responsive">
                    <table class="table table-hover m-0 align-middle">
                        <thead class="table-light">
                        <tr>
                            <th class="px-3 py-2" style="width:60px">Ảnh</th>
                            <th class="py-2">Sản phẩm</th>
                            <th class="py-2 text-center">SL</th>
                            <th class="py-2 text-end">Đơn giá</th>
                            <th class="py-2 text-end px-3">Thành tiền</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(order.items)}">
                            <td colspan="5" class="text-center py-3 text-muted">Không có sản phẩm.</td>
                        </tr>
                        <tr th:each="item : ${order.items}">
                            <td class="px-3">
                                <img th:if="${item.productImageUrl != null}"
                                     th:src="${item.productImageUrl}"
                                     width="44" height="44"
                                     class="rounded border object-fit-cover"
                                     th:alt="${item.productName}">
                                <span th:unless="${item.productImageUrl != null}"
                                      class="badge bg-light text-muted border">
                                    <i class="fa-solid fa-image"></i>
                                </span>
                            </td>
                            <td>
                                <span class="fw-medium" th:text="${item.productName}"></span>
                                <br>
                                <small class="text-muted" th:text="'#' + ${item.productId}"></small>
                            </td>
                            <td class="text-center fw-bold" th:text="${item.quantity}"></td>
                            <td class="text-end text-muted small"
                                th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                            </td>
                            <td class="text-end px-3 fw-medium text-success"
                                th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                            </td>
                        </tr>
                        </tbody>
                        <tfoot class="table-light">
                        <tr>
                            <td colspan="4" class="text-end fw-bold px-3 py-2">Tổng cộng:</td>
                            <td class="text-end px-3 fw-bold text-success fs-6"
                                th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}">
                            </td>
                        </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

            <!-- Shipping & Note -->
            <div class="card shadow-sm border-0">
                <div class="card-header fw-bold bg-white border-bottom">
                    <i class="fa-solid fa-location-dot me-2 text-primary"></i>Thông tin giao hàng
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-medium">Địa chỉ giao hàng</label>
                        <p class="mb-0"
                           th:text="${order.shippingAddress != null and !order.shippingAddress.isBlank()} ? ${order.shippingAddress} : '— Chưa có địa chỉ —'">
                        </p>
                    </div>
                    <div>
                        <label class="form-label text-muted small fw-medium">Ghi chú từ khách</label>
                        <p class="mb-0 fst-italic text-muted"
                           th:text="${order.note != null and !order.note.isBlank()} ? ${order.note} : '— Không có ghi chú —'">
                        </p>
                    </div>
                </div>
            </div>

        </div>

        <!-- Right: status + customer info -->
        <div class="col-lg-4">

            <!-- Status update -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header fw-bold bg-white border-bottom">
                    <i class="fa-solid fa-circle-half-stroke me-2 text-primary"></i>Trạng thái đơn hàng
                </div>
                <div class="card-body">
                    <div class="mb-3 text-center">
                        <span class="badge fs-6 py-2 px-3"
                              th:classappend="${order.status.badgeClass}"
                              th:text="${order.status.label}">
                        </span>
                    </div>

                    <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post">
                        <input th:if="${_csrf != null}" type="hidden"
                               th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Cập nhật sang</label>
                            <select name="newStatus" class="form-select">
                                <option th:each="s : ${orderStatuses}"
                                        th:value="${s.name()}"
                                        th:text="${s.label}"
                                        th:selected="${s == order.status}">
                                </option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">
                            <i class="fa-solid fa-floppy-disk me-1"></i> Lưu trạng thái
                        </button>
                    </form>
                </div>
            </div>

            <!-- Customer info -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header fw-bold bg-white border-bottom">
                    <i class="fa-solid fa-user me-2 text-primary"></i>Khách hàng
                </div>
                <div class="card-body">
                    <dl class="mb-0 row g-1">
                        <dt class="col-5 text-muted small">Tên</dt>
                        <dd class="col-7 fw-medium" th:text="${order.userFullName}"></dd>
                        <dt class="col-5 text-muted small">Username</dt>
                        <dd class="col-7" th:text="'@' + ${order.username}"></dd>
                        <dt class="col-5 text-muted small">Email</dt>
                        <dd class="col-7 small" th:text="${order.userEmail}"></dd>
                    </dl>
                </div>
            </div>

            <!-- Order timestamps -->
            <div class="card shadow-sm border-0">
                <div class="card-header fw-bold bg-white border-bottom">
                    <i class="fa-regular fa-clock me-2 text-primary"></i>Thời gian
                </div>
                <div class="card-body">
                    <dl class="mb-0 row g-1">
                        <dt class="col-5 text-muted small">Tạo đơn</dt>
                        <dd class="col-7 small"
                            th:text="${order.createdAt != null} ? ${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')} : '—'">
                        </dd>
                        <dt class="col-5 text-muted small">Đặt hàng</dt>
                        <dd class="col-7 small"
                            th:text="${order.orderedAt != null} ? ${#temporals.format(order.orderedAt, 'dd/MM/yyyy HH:mm')} : '—'">
                        </dd>
                        <dt class="col-5 text-muted small">Cập nhật</dt>
                        <dd class="col-7 small"
                            th:text="${order.updatedAt != null} ? ${#temporals.format(order.updatedAt, 'dd/MM/yyyy HH:mm')} : '—'">
                        </dd>
                    </dl>
                </div>
            </div>

        </div>
    </div>

</div>
</body>
</html>
