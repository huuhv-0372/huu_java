<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title th:text="${pageTitle}">Chỉnh sửa tài khoản</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0 text-primary">
            <i class="fa-solid fa-user-pen me-2"></i>
            <span th:text="${pageTitle}">Chỉnh sửa tài khoản</span>
        </h2>
        <a th:href="@{/admin/users}" class="btn btn-secondary shadow-sm">
            <i class="fa-solid fa-arrow-left me-1"></i> Quay lại
        </a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- Left: edit form -->
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-header fw-bold bg-white border-bottom">
                    <i class="fa-solid fa-circle-info me-2 text-primary"></i>Thông tin tài khoản
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/users/{id}/edit(id=${userEditReqDto.id})}"
                          method="post"
                          th:object="${userEditReqDto}">
                        <input th:if="${_csrf != null}" type="hidden"
                               th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" th:field="*{id}"/>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Họ và tên <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{fullName}"
                                       placeholder="Nguyễn Văn A">
                                <div class="text-danger small mt-1"
                                     th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Username</label>
                                <input type="text" class="form-control bg-light"
                                       th:value="${userDetail.username}" disabled>
                                <div class="form-text">Username không thể thay đổi.</div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" th:field="*{email}">
                                <div class="text-danger small mt-1"
                                     th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Số điện thoại <span class="text-danger">*</span></label>
                                <input type="tel" class="form-control" th:field="*{phone}"
                                       placeholder="0912345678">
                                <div class="text-danger small mt-1"
                                     th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium">Vai trò <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{role}">
                                    <option th:each="r : ${roles}"
                                            th:value="${r.name()}"
                                            th:text="${r.label}">
                                    </option>
                                </select>
                                <div class="text-danger small mt-1"
                                     th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
                            </div>
                            <div class="col-md-6 mb-3 d-flex align-items-end">
                                <div class="form-check form-switch pb-2">
                                    <input class="form-check-input" type="checkbox"
                                           role="switch" id="isActive" th:field="*{isActive}">
                                    <label class="form-check-label fw-medium" for="isActive">
                                        Tài khoản đang hoạt động
                                    </label>
                                </div>
                            </div>
                        </div>

                        <hr class="my-3">

                        <div class="mb-4">
                            <label class="form-label fw-medium">Mật khẩu mới</label>
                            <input type="password" class="form-control" th:field="*{newPassword}"
                                   placeholder="Để trống nếu không muốn đổi mật khẩu">
                            <div class="form-text">Tối thiểu 6 ký tự. Để trống = giữ nguyên mật khẩu cũ.</div>
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Hủy</a>
                            <button type="submit" class="btn btn-primary fw-bold px-4">
                                <i class="fa-solid fa-floppy-disk me-1"></i> Lưu thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Right: user info summary -->
        <div class="col-lg-4">

            <!-- Avatar + basic info -->
            <div class="card shadow-sm border-0 mb-4 text-center">
                <div class="card-body py-4">
                    <img th:if="${userDetail.avatarUrl != null}"
                         th:src="${userDetail.avatarUrl}"
                         width="80" height="80"
                         class="rounded-circle border mb-3 object-fit-cover">
                    <div th:unless="${userDetail.avatarUrl != null}"
                         class="d-inline-flex align-items-center justify-content-center rounded-circle bg-secondary text-white fw-bold mb-3"
                         style="width:80px;height:80px;font-size:1.8rem;"
                         th:text="${#strings.substring(userDetail.fullName, 0, 1).toUpperCase()}">
                    </div>
                    <div class="fw-bold fs-6" th:text="${userDetail.fullName}"></div>
                    <div class="text-muted small" th:text="'@' + ${userDetail.username}"></div>
                    <div class="mt-2">
                        <span class="badge me-1"
                              th:classappend="${userDetail.role.name() == 'ROLE_ADMIN'} ? 'bg-danger' : 'bg-primary'"
                              th:text="${userDetail.role.label}">
                        </span>
                        <span class="badge"
                              th:classappend="${userDetail.isActive} ? 'bg-success' : 'bg-secondary'"
                              th:text="${userDetail.isActive} ? 'Hoạt động' : 'Đã khóa'">
                        </span>
                    </div>
                </div>
            </div>

            <!-- Meta info -->
            <div class="card shadow-sm border-0">
                <div class="card-header fw-bold bg-white border-bottom">
                    <i class="fa-regular fa-clock me-2 text-primary"></i>Thông tin hệ thống
                </div>
                <div class="card-body">
                    <dl class="mb-0 row g-2 small">
                        <dt class="col-5 text-muted">Provider</dt>
                        <dd class="col-7">
                            <span class="badge bg-light text-dark border"
                                  th:text="${userDetail.authProvider}"></span>
                        </dd>
                        <dt class="col-5 text-muted">Ngày tạo</dt>
                        <dd class="col-7"
                            th:text="${userDetail.createdAt != null ? #temporals.format(userDetail.createdAt, 'dd/MM/yyyy HH:mm') : '—'}">
                        </dd>
                        <dt class="col-5 text-muted">Cập nhật</dt>
                        <dd class="col-7"
                            th:text="${userDetail.updatedAt != null ? #temporals.format(userDetail.updatedAt, 'dd/MM/yyyy HH:mm') : '—'}">
                        </dd>
                    </dl>
                </div>
            </div>

        </div>
    </div>

</div>
</body>
</html>
