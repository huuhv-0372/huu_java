<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/base}">
<head>
    <title th:text="${pageTitle}">Form Danh Mục</title>
</head>
<body>

<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0 text-primary">
            <i class="fa-solid fa-pen-to-square me-2"></i><span th:text="${pageTitle}">Thêm/Sửa Danh Mục</span>
        </h2>
        <a th:href="@{/admin/categories}" class="btn btn-secondary shadow-sm">
            <i class="fa-solid fa-arrow-left me-1"></i> Quay lại
        </a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <form th:action="${categoryReqDto.id != null || editId != null} ? @{/admin/categories/edit/{id}(id=${categoryReqDto.id != null ? categoryReqDto.id : editId})} : @{/admin/categories/add}"
                          method="post" th:object="${categoryReqDto}">
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label for="name" class="form-label fw-medium">Tên Danh Mục <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="Ví dụ: Trà sữa, Đồ ăn vặt..." required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="type" class="form-label fw-medium">Phân Loại <span class="text-danger">*</span></label>
                            <select class="form-select" id="type" th:field="*{type}" required>
                                <option th:each="t : ${categoryTypes}"
                                        th:value="${t.name()}"
                                        th:text="${t.label + ' (' + t.name() + ')'}">
                                </option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-medium">Mô Tả</label>
                            <textarea class="form-control" id="description" th:field="*{description}" rows="4" placeholder="Mô tả ngắn gọn về danh mục này..."></textarea>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="reset" class="btn btn-light border">Nhập lại</button>
                            <button type="submit" class="btn btn-primary fw-bold px-4">
                                <i class="fa-solid fa-floppy-disk me-1"></i> Lưu Dữ Liệu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
